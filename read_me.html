<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ASRAD Reader</title>
	<link rel="preconnect" href="https://cdn.jsdelivr.net">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.min.css">
	<style>
		:root {
			color-scheme: light;
			--page-bg: #f5f7fb;
			--panel-bg: #ffffff;
			--border: #d8dee9;
			--text: #1f2937;
			--muted: #6b7280;
			--accent: #2563eb;
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			min-height: 100%;
			background: var(--page-bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
		}

		body {
			padding: 24px;
		}

		.shell {
			max-width: 980px;
			margin: 0 auto;
		}

		.toolbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 16px;
			padding: 12px 16px;
			border: 1px solid var(--border);
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.78);
			backdrop-filter: blur(8px);
			box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
		}

		.title {
			margin: 0;
			font-size: 1rem;
			font-weight: 700;
		}

		.meta {
			margin: 0.2rem 0 0;
			color: var(--muted);
			font-size: 0.9rem;
		}

		.switcher {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			justify-content: flex-end;
		}

		.switcher button {
			border: 1px solid var(--border);
			border-radius: 999px;
			background: #fff;
			color: var(--text);
			padding: 8px 12px;
			font: inherit;
			cursor: pointer;
			transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
		}

		.switcher button[aria-pressed="true"] {
			border-color: var(--accent);
			color: var(--accent);
			background: rgba(37, 99, 235, 0.08);
		}

		.panel {
			border: 1px solid var(--border);
			border-radius: 16px;
			background: var(--panel-bg);
			box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
			overflow: hidden;
		}

		.status {
			padding: 14px 18px;
			border-bottom: 1px solid var(--border);
			color: var(--muted);
			font-size: 0.92rem;
			background: linear-gradient(180deg, rgba(248, 250, 252, 0.9), rgba(255, 255, 255, 0.9));
		}

		.markdown-body {
			padding: 32px;
			background: transparent;
		}

		.loading,
		.error {
			padding: 24px 32px 40px;
			color: var(--muted);
		}

		.error {
			color: #b42318;
			white-space: pre-wrap;
		}

		@media (max-width: 720px) {
			body {
				padding: 12px;
			}

			.toolbar {
				flex-direction: column;
				align-items: flex-start;
			}

			.switcher {
				width: 100%;
				justify-content: flex-start;
			}

			.markdown-body {
				padding: 20px;
			}
		}
	</style>
</head>
<body>
	<div class="shell">
		<header class="toolbar">
			<div>
				<h1 class="title">ASRAD Reader</h1>
				<p class="meta" id="meta">Loading the best matching README for your browser language.</p>
			</div>
			<div class="switcher" aria-label="Language switcher">
				<button type="button" data-lang="auto" aria-pressed="true">Auto</button>
				<button type="button" data-lang="en" aria-pressed="false">English</button>
				<button type="button" data-lang="zh-TW" aria-pressed="false">繁體中文</button>
			</div>
		</header>

		<main class="panel">
			<div class="status" id="status">Preparing preview...</div>
			<article class="markdown-body" id="content"></article>
		</main>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/marked@13.0.2/marked.min.js"></script>
	<script>
		const README_FILES = {
			en: 'readme.md',
			'zh-TW': 'readme_ZhTW.md'
		};

		const POLL_INTERVAL = 3000;
		const contentEl = document.getElementById('content');
		const metaEl = document.getElementById('meta');
		const statusEl = document.getElementById('status');
		const buttons = Array.from(document.querySelectorAll('.switcher button'));

		marked.setOptions({
			breaks: true,
			gfm: true
		});

		function detectLanguage() {
			const language = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
			return language.startsWith('zh') ? 'zh-TW' : 'en';
		}

		function resolveLanguage(selection) {
			if (selection === 'auto') {
				return detectLanguage();
			}
			return selection === 'zh-TW' ? 'zh-TW' : 'en';
		}

		function setActiveButton(selection) {
			buttons.forEach((button) => {
				button.setAttribute('aria-pressed', String(button.dataset.lang === selection));
			});
		}

		function updateStatus(message) {
			statusEl.textContent = message;
		}

		function renderMarkdown(markdown, fileName, language) {
			contentEl.innerHTML = marked.parse(markdown);
			metaEl.textContent = `Showing ${fileName} for ${language === 'zh-TW' ? 'Traditional Chinese' : 'English'}.`;
			updateStatus(`Opening ${fileName}`);
		}

		async function fetchMarkdown(fileName) {
			const response = await fetch(`${fileName}?v=${Date.now()}`, { cache: 'no-store' });
			if (!response.ok) {
				throw new Error(`Failed to load ${fileName}: ${response.status} ${response.statusText}`);
			}
			return response.text();
		}

		let currentSelection = 'auto';
		let currentFile = '';
		let lastMarkdown = '';
		let pollingTimer = null;

		async function loadCurrentMarkdown(forceRender = false) {
			const language = resolveLanguage(currentSelection);
			const fileName = README_FILES[language];

			if (fileName !== currentFile) {
				currentFile = fileName;
				lastMarkdown = '';
				updateStatus(`Loading ${fileName}...`);
			}

			try {
				const markdown = await fetchMarkdown(fileName);
				if (forceRender || markdown !== lastMarkdown) {
					lastMarkdown = markdown;
					renderMarkdown(markdown, fileName, language);
				} else {
					updateStatus(`Up to date: ${fileName}`);
				}
			} catch (error) {
				contentEl.innerHTML = '';
				updateStatus(`Unable to load ${fileName}`);
				metaEl.textContent = 'Make sure this HTML file is opened from the repository root so it can read the README files.';
				contentEl.innerHTML = `<div class="error">${String(error.message || error)}</div>`;
			}
		}

		function restartPolling() {
			if (pollingTimer) {
				clearInterval(pollingTimer);
			}
			pollingTimer = setInterval(() => {
				loadCurrentMarkdown(false);
			}, POLL_INTERVAL);
		}

		buttons.forEach((button) => {
			button.addEventListener('click', () => {
				currentSelection = button.dataset.lang;
				setActiveButton(currentSelection);
				loadCurrentMarkdown(true);
				restartPolling();
			});
		});

		setActiveButton(currentSelection);
		loadCurrentMarkdown(true);
		restartPolling();
	</script>
</body>
</html>
